<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.04"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#grid)"/>

  <!-- ===== 查询流程 ===== -->
  <rect x="40" y="68" width="1120" height="200" rx="12" fill="url(#g1)" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="70" y="102" fill="#60a5fa" font-family="Arial, sans-serif" font-size="22" font-weight="bold">查询流程层 (Query Process)</text>

  <rect x="70" y="125" width="230" height="120" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="185" y="160" fill="#93c5fd" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">1. 意图分类</text>
  <text x="185" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">将查询归类为</text>
  <text x="185" y="210" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">WHY / WHEN / WHAT / ENTITY</text>

  <line x1="310" y1="185" x2="375" y2="185" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="390" y="125" width="230" height="120" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="505" y="160" fill="#93c5fd" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">2. RRF 多信号融合</text>
  <text x="505" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">合并三条信号源</text>
  <text x="505" y="210" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">向量 + 关键词 + 时间</text>

  <line x1="630" y1="185" x2="695" y2="185" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="710" y="125" width="230" height="120" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="825" y="160" fill="#93c5fd" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">3. 束搜索遍历</text>
  <text x="825" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">意图加权边优先级</text>
  <text x="825" y="210" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">图谱遍历 (算法 1)</text>

  <line x1="950" y1="185" x2="1015" y2="185" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="1030" y="125" width="100" height="120" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="1080" y="160" fill="#93c5fd" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">4. 线性化</text>
  <text x="1080" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">拓扑排序</text>
  <text x="1080" y="210" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">+ Token截断</text>

  <line x1="600" y1="273" x2="600" y2="315" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <!-- ===== 数据结构 ===== -->
  <rect x="40" y="328" width="1120" height="200" rx="12" fill="url(#g2)" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="70" y="362" fill="#a78bfa" font-family="Arial, sans-serif" font-size="22" font-weight="bold">数据结构层 (Data Structure)</text>

  <rect x="70" y="380" width="680" height="128" rx="8" fill="#1e1b3a" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="410" y="410" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">图数据库 — 关系图谱</text>

  <rect x="95" y="428" width="150" height="36" rx="5" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="170" y="451" fill="#fca5a5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">时序边</text>

  <rect x="260" y="428" width="150" height="36" rx="5" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="335" y="451" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">因果边</text>

  <rect x="425" y="428" width="150" height="36" rx="5" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="500" y="451" fill="#93c5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">语义边</text>

  <rect x="590" y="428" width="145" height="36" rx="5" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="662" y="451" fill="#fcd34d" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">实体边</text>

  <text x="410" y="490" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">PRECEDES / LEADS_TO / SIMILAR_TO / REFERS_TO</text>

  <rect x="780" y="380" width="350" height="128" rx="8" fill="#1e1b3a" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="955" y="415" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">向量数据库</text>
  <text x="955" y="443" fill="#8b949e" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">FAISS / NumPy 索引</text>
  <text x="955" y="467" fill="#8b949e" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">余弦相似度</text>
  <text x="955" y="491" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">all-MiniLM-L6-v2 · 本地嵌入</text>

  <line x1="600" y1="533" x2="600" y2="575" stroke="#10b981" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- ===== 记忆演化 ===== -->
  <rect x="40" y="588" width="1120" height="148" rx="12" fill="url(#g3)" stroke="#10b981" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="70" y="622" fill="#34d399" font-family="Arial, sans-serif" font-size="22" font-weight="bold">记忆演化层 — 写入/更新 (Memory Evolution)</text>

  <rect x="70" y="640" width="530" height="78" rx="8" fill="#0d3320" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="335" y="668" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">快路径 — 即时写入</text>
  <text x="335" y="692" fill="#8b949e" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">写入 → 嵌入 → 存入图数据库 → 加时序边 → 入队</text>

  <line x1="610" y1="679" x2="665" y2="679" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrowPurple)"/>

  <rect x="680" y="640" width="450" height="78" rx="8" fill="#1a1a0d" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="905" y="668" fill="#fcd34d" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">慢路径 — 后台整合</text>
  <text x="905" y="692" fill="#8b949e" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">出队 → 提取2-hop子图 → LLM 推断 → 因果边 / 实体边</text>
</svg>