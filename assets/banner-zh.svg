<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="44" fill="#f0f6fc" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" letter-spacing="2">MAGMA 架构总览</text>

  <!-- ===== LAYER 1: 查询流程 ===== -->
  <rect x="50" y="70" width="1100" height="170" rx="12" fill="url(#g1)" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="80" y="100" fill="#60a5fa" font-family="Arial, sans-serif" font-size="16" font-weight="bold">查询流程层 (Query Process)</text>

  <rect x="80" y="120" width="200" height="95" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="180" y="150" fill="#93c5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">1. 意图分类</text>
  <text x="180" y="172" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">将查询归类为</text>
  <text x="180" y="190" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">WHY / WHEN / WHAT / ENTITY</text>

  <line x1="290" y1="167" x2="340" y2="167" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="355" y="120" width="200" height="95" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="455" y="150" fill="#93c5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2. RRF 多信号融合</text>
  <text x="455" y="172" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">合并三条信号源</text>
  <text x="455" y="190" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">向量 + 关键词 + 时间</text>

  <line x1="565" y1="167" x2="615" y2="167" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="630" y="120" width="200" height="95" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="730" y="150" fill="#93c5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">3. 束搜索遍历</text>
  <text x="730" y="172" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">意图加权边优先级</text>
  <text x="730" y="190" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">图谱遍历 (算法 1)</text>

  <line x1="840" y1="167" x2="890" y2="167" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="905" y="120" width="200" height="95" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="1005" y="150" fill="#93c5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">4. 线性化输出</text>
  <text x="1005" y="172" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">拓扑排序 +</text>
  <text x="1005" y="190" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">Token 预算截断</text>

  <!-- Down arrow -->
  <line x1="600" y1="245" x2="600" y2="285" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- ===== LAYER 2: 数据结构 ===== -->
  <rect x="50" y="295" width="1100" height="185" rx="12" fill="url(#g2)" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="80" y="325" fill="#a78bfa" font-family="Arial, sans-serif" font-size="16" font-weight="bold">数据结构层 (Data Structure)</text>

  <!-- GraphDB -->
  <rect x="80" y="340" width="640" height="120" rx="8" fill="#1e1b3a" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="400" y="365" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">图数据库 — 关系图谱</text>

  <rect x="105" y="380" width="140" height="32" rx="5" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="175" y="400" fill="#fca5a5" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">时序边</text>

  <rect x="260" y="380" width="140" height="32" rx="5" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="330" y="400" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">因果边</text>

  <rect x="420" y="380" width="140" height="32" rx="5" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="490" y="400" fill="#93c5fd" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">语义边</text>

  <rect x="575" y="380" width="130" height="32" rx="5" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.5"/>
  <text x="640" y="400" fill="#fcd34d" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">实体边</text>

  <text x="400" y="440" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">四类关系边：前驱 PRECEDES / 导致 LEADS_TO / 相似 SIMILAR_TO / 引用 REFERS_TO</text>

  <!-- VectorDB -->
  <rect x="750" y="340" width="370" height="120" rx="8" fill="#1e1b3a" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="935" y="370" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">向量数据库</text>
  <text x="935" y="395" fill="#8b949e" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">FAISS / NumPy 索引</text>
  <text x="935" y="415" fill="#8b949e" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">余弦相似度</text>
  <text x="935" y="440" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">all-MiniLM-L6-v2 · 本地嵌入</text>

  <!-- Down arrow -->
  <line x1="600" y1="485" x2="600" y2="525" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ===== LAYER 3: 记忆演化 ===== -->
  <rect x="50" y="535" width="1100" height="145" rx="12" fill="url(#g3)" stroke="#10b981" stroke-opacity="0.25" stroke-width="1.5"/>
  <text x="80" y="565" fill="#34d399" font-family="Arial, sans-serif" font-size="16" font-weight="bold">记忆演化层 — 写入/更新 (Memory Evolution)</text>

  <!-- Fast Path -->
  <rect x="80" y="580" width="510" height="80" rx="8" fill="#0d3320" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="335" y="605" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">快路径 — 即时写入</text>
  <text x="335" y="625" fill="#8b949e" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">写入 → 嵌入 → 存入图数据库 → 加时序边 → 入队待慢路径</text>
  <text x="335" y="648" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">延迟 &lt;100ms · 本地嵌入 · 无需 LLM</text>

  <!-- Arrow -->
  <line x1="600" y1="620" x2="650" y2="620" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Slow Path -->
  <rect x="660" y="580" width="460" height="80" rx="8" fill="#1a1a0d" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="890" y="605" fill="#fcd34d" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">慢路径 — 后台整合</text>
  <text x="890" y="625" fill="#8b949e" font-family="Arial, sans-serif" font-size="12" text-anchor="middle">出队 → 提取2-hop子图 → LLM 推断 → 创建因果边 / 实体边</text>
  <text x="890" y="648" fill="#64748b" font-family="Arial, sans-serif" font-size="11" text-anchor="middle">延迟 5–60s · 需要 LLM API · 后台 Worker</text>
</svg>