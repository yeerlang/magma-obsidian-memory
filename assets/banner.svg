<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1125" width="1800" height="1125">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:0.04"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.75"/>
    </pattern>
    <marker id="aB" markerWidth="15" markerHeight="10" refX="13" refY="5.5" orient="auto">
      <polygon points="0 0, 15 5.5, 0 10" fill="#3b82f6"/>
    </marker>
    <marker id="aP" markerWidth="15" markerHeight="10" refX="13" refY="5.5" orient="auto">
      <polygon points="0 0, 15 5.5, 0 10" fill="#8b5cf6"/>
    </marker>
    <marker id="aG" markerWidth="15" markerHeight="10" refX="13" refY="5.5" orient="auto">
      <polygon points="0 0, 15 5.5, 0 10" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1800" height="1125" fill="url(#bg)"/>
  <rect width="1800" height="1125" fill="url(#grid)"/>

  <g transform="scale(1.5)">

    <!-- ===== LAYER 1 ===== -->
    <rect x="40" y="68" width="1120" height="200" rx="12" fill="url(#g1)" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="70" y="102" fill="#60a5fa" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Query Process Layer</text>

    <rect x="70" y="125" width="230" height="120" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="185" y="160" fill="#93c5fd" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">1. Intent Classification</text>
    <text x="185" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Classifies query into</text>
    <text x="185" y="210" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">WHY / WHEN / WHAT / ENTITY</text>

    <line x1="310" y1="185" x2="375" y2="185" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#aB)"/>

    <rect x="390" y="125" width="230" height="120" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="505" y="160" fill="#93c5fd" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">2. RRF Fusion</text>
    <text x="505" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Merges 3 signal sources</text>
    <text x="505" y="210" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Vector + Keyword + Time</text>

    <line x1="630" y1="185" x2="695" y2="185" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#aB)"/>

    <rect x="710" y="125" width="230" height="120" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="825" y="160" fill="#93c5fd" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">3. Beam Search</text>
    <text x="825" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Intent-weighted graph</text>
    <text x="825" y="210" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">traversal (Algorithm 1)</text>

    <line x1="950" y1="185" x2="1015" y2="185" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#aB)"/>

    <rect x="1030" y="125" width="100" height="120" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="1080" y="160" fill="#93c5fd" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">4. Linearization</text>
    <text x="1080" y="188" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">Topological sort</text>
    <text x="1080" y="210" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">+ token budget</text>

    <line x1="600" y1="273" x2="600" y2="315" stroke="#8b5cf6" stroke-width="2.5" marker-end="url(#aP)"/>

    <!-- ===== LAYER 2 ===== -->
    <rect x="40" y="328" width="1120" height="200" rx="12" fill="url(#g2)" stroke="#8b5cf6" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="70" y="362" fill="#a78bfa" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Data Structure Layer</text>

    <rect x="70" y="380" width="680" height="128" rx="8" fill="#1e1b3a" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="410" y="410" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">GraphDB — Relation Graphs</text>

    <rect x="95" y="428" width="150" height="36" rx="5" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="170" y="451" fill="#fca5a5" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Temporal Edges</text>

    <rect x="260" y="428" width="150" height="36" rx="5" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="335" y="451" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Causal Edges</text>

    <rect x="425" y="428" width="150" height="36" rx="5" fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="500" y="451" fill="#93c5fd" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Semantic Edges</text>

    <rect x="590" y="428" width="145" height="36" rx="5" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.5"/>
    <text x="662" y="451" fill="#fcd34d" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Entity Edges</text>

    <text x="410" y="490" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">PRECEDES / LEADS_TO / SIMILAR_TO / REFERS_TO</text>

    <rect x="780" y="380" width="350" height="128" rx="8" fill="#1e1b3a" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="955" y="415" fill="#c4b5fd" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle">VectorDB</text>
    <text x="955" y="443" fill="#8b949e" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">FAISS / NumPy Index</text>
    <text x="955" y="467" fill="#8b949e" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Cosine Similarity</text>
    <text x="955" y="491" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13" text-anchor="middle">all-MiniLM-L6-v2 · local</text>

    <line x1="600" y1="533" x2="600" y2="575" stroke="#10b981" stroke-width="2.5" marker-end="url(#aG)"/>

    <!-- ===== LAYER 3 ===== -->
    <rect x="40" y="588" width="1120" height="148" rx="12" fill="url(#g3)" stroke="#10b981" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="70" y="622" fill="#34d399" font-family="Arial, sans-serif" font-size="22" font-weight="bold">Memory Evolution Layer (Write / Update)</text>

    <rect x="70" y="640" width="530" height="78" rx="8" fill="#0d3320" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="335" y="668" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">Fast Path — Ingestion</text>
    <text x="335" y="692" fill="#8b949e" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Write → Embed → Store in GraphDB → Add Temporal Edge → Enqueue</text>

    <line x1="610" y1="679" x2="665" y2="679" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#aP)"/>

    <rect x="680" y="640" width="450" height="78" rx="8" fill="#1a1a0d" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.5"/>
    <text x="905" y="668" fill="#fcd34d" font-family="Arial, sans-serif" font-size="17" font-weight="bold" text-anchor="middle">Slow Path — Consolidation</text>
    <text x="905" y="692" fill="#8b949e" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Dequeue → 2-Hop Subgraph → LLM → Causal / Entity Edges</text>

  </g>
</svg>