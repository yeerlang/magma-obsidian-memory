<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="core">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Core glow -->
  <circle cx="600" cy="260" r="180" fill="url(#core)"/>
  
  <!-- Temporal graph (red) -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="400" cy="200" r="6" fill="#ef4444"/>
    <circle cx="450" cy="180" r="5" fill="#ef4444"/>
    <circle cx="500" cy="210" r="7" fill="#ef4444"/>
    <circle cx="360" cy="230" r="5" fill="#ef4444"/>
    <line x1="400" y1="200" x2="450" y2="180" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <line x1="450" y1="180" x2="500" y2="210" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>
    <text x="470" y="250" fill="#ef4444" font-family="monospace" font-size="12" text-anchor="middle">TEMPORAL</text>
  </g>
  
  <!-- Semantic graph (blue) -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="700" cy="160" r="7" fill="#3b82f6"/>
    <circle cx="750" cy="190" r="5" fill="#3b82f6"/>
    <circle cx="680" cy="220" r="6" fill="#3b82f6"/>
    <circle cx="790" cy="210" r="5" fill="#3b82f6"/>
    <line x1="700" y1="160" x2="750" y2="190" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="750" y1="190" x2="790" y2="210" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <text x="730" y="250" fill="#3b82f6" font-family="monospace" font-size="12" text-anchor="middle">SEMANTIC</text>
  </g>
  
  <!-- Causal graph (green) -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="500" cy="320" r="6" fill="#10b981"/>
    <circle cx="550" cy="300" r="5" fill="#10b981"/>
    <circle cx="600" cy="340" r="5" fill="#10b981"/>
    <line x1="500" y1="320" x2="550" y2="300" stroke="#10b981" stroke-width="1.5" opacity="0.5"/>
    <line x1="550" y1="300" x2="600" y2="340" stroke="#10b981" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow-green)"/>
    <text x="550" y="370" fill="#10b981" font-family="monospace" font-size="12" text-anchor="middle">CAUSAL</text>
  </g>
  
  <!-- Entity graph (purple) -->
  <g filter="url(#glow)" opacity="0.8">
    <circle cx="650" cy="340" r="7" fill="#8b5cf6"/>
    <circle cx="700" cy="310" r="6" fill="#8b5cf6"/>
    <circle cx="610" cy="370" r="5" fill="#8b5cf6"/>
    <line x1="650" y1="340" x2="700" y2="310" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <text x="660" y="400" fill="#8b5cf6" font-family="monospace" font-size="12" text-anchor="middle">ENTITY</text>
  </g>
  
  <!-- Obsidian crystal motif -->
  <g opacity="0.15" transform="translate(600,260)">
    <polygon points="0,-30 20,10 -20,10" fill="#7c3aed"/>
    <polygon points="0,-30 40,15 0,20" fill="#a78bfa"/>
    <polygon points="-20,10 0,20 -40,15" fill="#6d28d9"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="470" fill="#f0f6fc" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" letter-spacing="2">
    MAGMA × Obsidian
  </text>
  <text x="600" y="520" fill="#8b949e" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" letter-spacing="1">
    Four-Graph Memory Engine for AI Agents
  </text>
  
  <!-- Bottom line -->
  <line x1="300" y1="555" x2="900" y2="555" stroke="#30363d" stroke-width="1"/>
</svg>
